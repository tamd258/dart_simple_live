name: Build Simple Live APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true

      - name: Fix Kotlin version
        run: |
          sed -i '' 's/id("org.jetbrains.kotlin.android") version "2.1.0"/id("org.jetbrains.kotlin.android") version "2.2.20"/' simple_live_app/android/settings.gradle.kts
          sed -i '' 's/id("com.android.application") version "8.9.1"/id("com.android.application") version "8.11.1"/' simple_live_app/android/settings.gradle.kts
          cat simple_live_app/android/settings.gradle.kts

      - name: Install dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Generate debug keystore
        run: |
          cd simple_live_app/android
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          echo "storeFile=$(pwd)/debug.keystore" > key.properties
          echo "storePassword=android" >> key.properties
          echo "keyAlias=androiddebugkey" >> key.properties
          echo "keyPassword=android" >> key.properties

      - name: Build Debug APK
        run: |
          cd simple_live_app
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
